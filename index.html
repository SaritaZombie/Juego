<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Coiny&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Concert+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
    <title>Adivina el Número</title>
</head>
<body>
    <header id="encabezado">
        <h1>⭐ ADIVINA EL NÚMERO ⭐</h1>
    </header>
    <main>
        <div class="contenedor">
            <div class="juego">
                <h2 id="temporizador">60</h2>
                <p id="instrucción">Ayuda a la flor a encontrar el número correcto 🌷</p>
                <input type="number" id="numero" placeholder="Escribe un número...">
                <button id="boton">Intentar</button>
                <p id="mensaje"></p>
                <p id="intentos"></p>
            </div>

            <div class="imagen">
                <video id="estado" autoplay loop muted>
                    <source src="img/normal.mp4" type="video/mp4">
                </video>
            </div>

            <div class="sonido">
                <audio id="miSonido" src="sounds/sonido.mp3"></audio>
                <button id="botonSonido">
                    <i class="fa-solid fa-volume-xmark"></i>
                </button>
            </div>
        </div>
        

        <script src="js/script.js" defer></script>
    </main>
    <footer id="pie">
        Sara Jiménez - 2026
    </footer>
</body>
</html>
